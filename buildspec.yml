version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing AWS CDK CLI..."
      - npm install -g aws-cdk
      - echo "Changing into cdk_backend directory"
      - cd cdk_backend
      - echo "Installing npm dependencies"
      - npm ci

  pre_build:
    commands:
      - echo "Building TypeScript sources"
      - npm run build


  build:
    commands:
      - echo "Deploying all CDK stacks..."
      - |
        CDK_CONTEXT=""
        if [ -n "${PDF_TO_PDF_BUCKET:-}" ] && [ "${PDF_TO_PDF_BUCKET}" != "Null" ]; then
          CDK_CONTEXT="$CDK_CONTEXT -c PDF_TO_PDF_BUCKET=$PDF_TO_PDF_BUCKET"
        fi
        if [ -n "${PDF_TO_HTML_BUCKET:-}" ] && [ "${PDF_TO_HTML_BUCKET}" != "Null" ]; then
          CDK_CONTEXT="$CDK_CONTEXT -c PDF_TO_HTML_BUCKET=$PDF_TO_HTML_BUCKET"
        fi
        if [ -n "${COGNITO_CLIENT_ID:-}" ] && [ "${COGNITO_CLIENT_ID}" != 'Null' ]; then
          CDK_CONTEXT="$CDK_CONTEXT -c COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID"
        fi
        if [ -n "${COGNITO_USER_POOL_ID:-}" ] && [ "${COGNITO_USER_POOL_ID}" != 'Null' ]; then
          CDK_CONTEXT="$CDK_CONTEXT -c COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID"
        fi
        cdk deploy --all --require-approval never $CDK_CONTEXT


  post_build:
    commands:
      - echo "CDK deployment complete."
